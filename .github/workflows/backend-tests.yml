name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: votingdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'src/backend/package-lock.json'

    - name: Install dependencies
      run: |
        cd src/backend
        npm ci

    - name: Run linter
      run: |
        cd src/backend
        npm run lint 2>/dev/null || echo "Linter check skipped (not configured)"

    - name: Run tests
      run: |
        cd src/backend
        npm test -- --coverage --passWithNoTests
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/votingdb_test
        JWT_SECRET: test-secret-key
        NODE_ENV: test

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./src/backend/coverage/lcov.info
        flags: backend
        fail_ci_if_error: false
