# Production Docker Compose Configuration
# Secured Voting System - Complete Stack

version: '3.9'

services:
  # =========================================================================
  # BACKEND API SERVICE
  # =========================================================================
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: voting-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-voting_system_prod}
      - DB_USER=${DB_USER:-voting_admin}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - JWT_EXPIRY=7d
      - RPC_URL=${RPC_URL:-http://127.0.0.1:8545}
      - VOTING_CONTRACT_ADDRESS=${VOTING_CONTRACT_ADDRESS:-0x0000000000000000000000000000000000000001}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - LOG_LEVEL=info
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voting-network
    volumes:
      - ./src/backend/logs:/app/logs
      - ./src/backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # =========================================================================
  # FRONTEND SERVICE
  # =========================================================================
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: voting-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:5000/api
      - REACT_APP_WEB3_RPC_URL=${RPC_URL:-http://127.0.0.1:8545}
      - REACT_APP_CONTRACT_ADDRESS=${VOTING_CONTRACT_ADDRESS}
    depends_on:
      - backend
    networks:
      - voting-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # POSTGRESQL DATABASE
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: voting-postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-voting_system_prod}
      - POSTGRES_USER=${DB_USER:-voting_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secure_password}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-voting_admin} -d ${DB_NAME:-voting_system_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # REDIS CACHE
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: voting-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - voting-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # NGINX REVERSE PROXY
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: voting-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - voting-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  voting-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
